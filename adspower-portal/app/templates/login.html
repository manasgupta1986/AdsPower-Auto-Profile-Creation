<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdsPower Portal Login</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#0f172a; color:#e2e8f0; display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { width:360px; background:#111827; padding:28px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.35); }
    h1 { margin:0 0 8px; font-size:24px; }
    p { color:#94a3b8; margin:0 0 20px; }
    input { width:100%; padding:12px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:white; margin:8px 0 14px; }
    button { width:100%; padding:12px; border:0; border-radius:10px; background:#2563eb; color:white; font-weight:600; cursor:pointer; }
    .error { color:#fca5a5; margin-bottom:12px; }
    .note { margin-top:12px; color:#94a3b8; font-size:12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Profile Provisioning Portal</h1>
    <p>Secure login for project managers and admins</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <label>Username</label>
      <input name="username" required />
      <label>Password</label>
      <input name="password" type="password" required />
      <button type="submit">Sign in</button>
    </form>
    <div class="note">Change the default admin credentials with environment variables before production use.</div>
  </div>
</body>
</html>
